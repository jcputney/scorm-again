name: OSV-Scanner

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    if: github.event_name != 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.2.4"
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  scan-pr:
    if: github.event_name == 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.2.4"
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
    permissions:
      actions: read
      contents: read
      security-events: write
